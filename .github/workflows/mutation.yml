name: Mutation Testing

on:
  schedule:
    - cron: "0 3 * * *"  # Every night at 03:00 UTC
  workflow_dispatch:       # Manual trigger via GitHub UI

jobs:
  mutation-test:
    name: Mutation Testing
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install mutmut>=3.5

      - name: Restore mutmut cache
        uses: actions/cache@v4
        with:
          path: .mutmut-cache
          key: mutmut-${{ hashFiles('custom_components/**/*.py') }}
          restore-keys: |
            mutmut-

      - name: Run mutation testing
        run: mutmut run
        timeout-minutes: 120

      - name: Generate report
        if: always()
        run: |
          echo "# Mutation Testing Report" > mutation-report.md
          echo "" >> mutation-report.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> mutation-report.md
          echo "" >> mutation-report.md
          echo '```' >> mutation-report.md
          mutmut results >> mutation-report.md 2>&1 || true
          echo '```' >> mutation-report.md
          echo "" >> mutation-report.md
          echo "## Survived Mutants" >> mutation-report.md
          echo "" >> mutation-report.md
          echo "These mutants were NOT caught by tests:" >> mutation-report.md
          echo "" >> mutation-report.md
          echo '```' >> mutation-report.md
          mutmut show survived >> mutation-report.md 2>&1 || true
          echo '```' >> mutation-report.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: mutation-report.md
          retention-days: 30

      - name: Post summary to job
        if: always()
        run: |
          echo "## Mutation Testing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          mutmut results >> $GITHUB_STEP_SUMMARY 2>&1 || true
