# --------------------------------------------------------------------------- #
# Tool configuration
# --------------------------------------------------------------------------- #

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # bugbear
    "PLC",  # pylint convention
    "PLE",  # pylint errors
    "PLW",  # pylint warnings
]
ignore = [
    "E501",     # line too long (handled by formatter)
    "PLC0415",  # import not at top level (intentional lazy imports)
]

[tool.ruff.lint.isort]
known-first-party = ["custom_components.roommind"]

[tool.mypy]
python_version = "3.12"
check_untyped_defs = true
disallow_untyped_defs = true
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = "homeassistant.*"
follow_imports = "skip"

[tool.coverage.run]
relative_files = true

[tool.mutmut]
paths_to_mutate = ["custom_components/roommind/"]
tests_dir = ["tests/"]
do_not_mutate = [
    "**/const.py",        # constants, no logic
    "**/config_flow.py",  # HA boilerplate
    "**/__init__.py",     # setup/registration, tested via integration
]
